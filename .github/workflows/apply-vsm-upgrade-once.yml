name: Generate VSM Code Artifact

on:
  pull_request:
    branches:
      - automation/trigger-vsm-upgrade
    types:
      - opened
  push:
    branches:
      - automation/trigger-vsm-upgrade
    paths:
      - .github/workflows/apply-vsm-upgrade-once.yml
      - .github/scripts/apply_vsm_upgrade_v2.py

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target code
        uses: actions/checkout@v4
        with:
          ref: dev_main_renderoptimize
          fetch-depth: 1
          show-progress: false

      - name: Fetch patch generator
        run: |
          git fetch origin automation/trigger-vsm-upgrade --depth=1
          git show origin/automation/trigger-vsm-upgrade:.github/scripts/apply_vsm_upgrade_v2.py > /tmp/apply_vsm_upgrade_v2.py

      - name: Generate VSM implementation
        run: python3 /tmp/apply_vsm_upgrade_v2.py

      - name: Validate code-only diff
        run: |
          git diff --check
          test -n "$(git status --porcelain)"
          grep -q "VirtualShadowPageOrigins" source/rendererresource.cpp
          grep -q "VirtualShadowResidency" shader/hlsl/common.hlsl
          grep -q "ReconstructContactWorldPosition" shader/hlsl/DeferredLightingPS.hlsl
          grep -q "NeedsRender" source/rendererresource.cpp

      - name: Package modified code
        run: |
          mkdir -p /tmp/vsm-code/source /tmp/vsm-code/shader/hlsl
          cp source/rendererstate.h /tmp/vsm-code/source/
          cp source/renderersettings.h /tmp/vsm-code/source/
          cp source/rendererresource.cpp /tmp/vsm-code/source/
          cp source/rendererdraw.cpp /tmp/vsm-code/source/
          cp shader/hlsl/common.hlsl /tmp/vsm-code/shader/hlsl/
          cp shader/hlsl/DeferredLightingPS.hlsl /tmp/vsm-code/shader/hlsl/
          cp shader/hlsl/AtmosphereGBufferPS.hlsl /tmp/vsm-code/shader/hlsl/

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: vsm-code-only
          path: /tmp/vsm-code
          if-no-files-found: error
